<title>大学物理实验期末机考刷题系统｜满分冲刺1000题</title>
<style>
:root{--brand:#52255B;--brand2:#7b3a86;--bg:#f7f3f8;--card:#fff;--text:#211827;--muted:#766b7d;--ok:#0b8f55;--bad:#c9342d;--line:#e7ddea;--warn:#b86b00}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--brand),#28132e);color:#fff;padding:14px 14px 10px;box-shadow:0 6px 18px rgba(40,19,46,.18)}h1{font-size:18px;margin:0 0 6px;font-weight:800}.sub{font-size:12px;opacity:.88;line-height:1.45}.wrap{max-width:980px;margin:0 auto;padding:12px 10px 78px}.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 22px rgba(82,37,91,.08)}.panel{padding:12px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.stat{background:#fbf8fc;border:1px solid var(--line);border-radius:12px;padding:8px;text-align:center}.stat b{display:block;font-size:18px;color:var(--brand)}.stat span{font-size:11px;color:var(--muted)}button,select,input{font:inherit}button{border:0;border-radius:12px;background:var(--brand);color:#fff;padding:10px 12px;font-weight:700;cursor:pointer}button.secondary{background:#eee3f0;color:var(--brand)}button.ghost{background:#fff;color:var(--brand);border:1px solid var(--line)}button.warn{background:#fff4e5;color:var(--warn);border:1px solid #ffd89d}button.danger{background:#fff0ef;color:var(--bad);border:1px solid #ffc7c3}button:active{transform:scale(.99)}select,input{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 11px;background:#fff;color:var(--text)}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.tabs button{white-space:nowrap;background:#eee3f0;color:var(--brand)}.tabs button.active{background:var(--brand);color:#fff}.card{padding:15px}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}.tag{font-size:11px;background:#f1e8f3;color:var(--brand);border-radius:999px;padding:4px 8px;font-weight:700}.tag.diff{background:#fff4e8;color:#a45b00}.qid{font-size:13px;color:var(--muted);margin-bottom:8px}.stem{font-size:17px;line-height:1.62;font-weight:750;white-space:pre-wrap}.options{display:grid;gap:9px;margin:14px 0}.opt{width:100%;text-align:left;background:#fff;color:var(--text);border:1.5px solid var(--line);padding:12px;border-radius:13px;line-height:1.5;font-weight:650}.opt.selected{border-color:var(--brand);background:#f6edf8}.opt.correct{border-color:var(--ok);background:#eaf8f1;color:#075f3a}.opt.wrong{border-color:var(--bad);background:#fff0ef;color:#941f1b}.answerBox{display:none;border-radius:14px;padding:12px;margin-top:10px;line-height:1.65}.answerBox.show{display:block}.answerBox.ok{background:#eaf8f1;border:1px solid #bfe8d2}.answerBox.bad{background:#fff0ef;border:1px solid #ffc7c3}.analysis{font-size:14px;color:#3d3442}.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}.nav button{padding:10px 6px;font-size:14px}.progress{height:8px;background:#eadfec;border-radius:99px;overflow:hidden;margin-top:10px}.bar{height:100%;background:linear-gradient(90deg,var(--brand),#c379d0);width:0}.small{font-size:12px;color:var(--muted);line-height:1.5}.examBar{display:none;background:#fff8ed;border:1px solid #ffd89d;color:#8a5300;border-radius:12px;padding:9px;margin-bottom:10px;font-size:13px}.examBar.show{display:block}.split{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hidden{display:none!important}.empty{text-align:center;color:var(--muted);padding:28px 10px}.footerNote{font-size:12px;color:var(--muted);line-height:1.6;margin-top:12px}@media(min-width:720px){.grid{grid-template-columns:repeat(4,1fr)}.nav{max-width:980px;left:50%;transform:translateX(-50%);border:1px solid var(--line);border-radius:18px 18px 0 0}.stem{font-size:18px}}
</style>
</head>
<body>
<header><h1>大学物理实验期末机考刷题系统</h1><div class="sub">南京信息工程大学方向｜满分冲刺1000题｜手机直接刷｜自动记录错题、收藏和进度</div></header>
<div class="wrap">
  <section class="panel">
    <div class="tabs" id="modeTabs"></div>
    <div class="grid" style="margin-top:10px">
      <select id="moduleFilter"></select>
      <select id="diffFilter"><option value="">全部难度</option><option value="3">★★★ 基础规范</option><option value="4">★★★★ 高分常考</option><option value="5">★★★★★ 满分冲刺</option></select>
      <input id="searchInput" placeholder="搜考点：声速 / 光栅 / 不确定度">
      <button class="secondary" id="resetFilterBtn">重置筛选</button>
    </div>
    <div class="stats">
      <div class="stat"><b id="totalNum">0</b><span>题库总量</span></div>
      <div class="stat"><b id="doneNum">0</b><span>已做</span></div>
      <div class="stat"><b id="rightRate">0%</b><span>正确率</span></div>
      <div class="stat"><b id="wrongNum">0</b><span>错题</span></div>
    </div>
    <div class="progress"><div class="bar" id="progressBar"></div></div>
  </section>
  <div class="examBar" id="examBar"></div>
  <main class="card" id="questionCard"></main>
  <section class="panel" style="margin-top:12px">
    <div class="split">
      <button class="ghost" id="exportWrongBtn">导出错题</button>
      <button class="danger" id="clearBtn">清空进度</button>
    </div>
    <p class="footerNote" id="checkInfo"></p>
  </section>
</div>
<div class="nav">
  <button class="secondary" id="prevBtn">上一题</button>
  <button class="secondary" id="favBtn">收藏</button>
  <button class="secondary" id="nextBtn">下一题</button>
  <button id="randomBtn">随机</button>
</div>
<script>
(function(){
const VERSION='2026.06.19-mobile-v1';
const STORE_KEY='nuist_phys_exp_quiz_v1';
const letters=['A','B','C','D'];
const modules=['误差与不确定度','仪器读数与操作','力学与热学实验','电磁学实验','光学实验','近代物理实验','数据处理与综合判断'];
const Q=[];
function fmt(x,d=3){let s=Number(x).toFixed(d);return s.replace(/\.0+$|(?<=\.\d*?)0+$/g,'').replace(/\.$/,'')}
function star(n){return '★'.repeat(n)+'☆'.repeat(5-n)}
function choicePack(correct,wrongs,id){let arr=[correct,...wrongs.slice(0,3)];let r=id%4;arr=arr.slice(r).concat(arr.slice(0,r));return {options:arr,answer:letters[arr.indexOf(correct)]}}
function addSingle(module,topic,diff,stem,correct,wrongs,analysis){const id=Q.length+1;const c=choicePack(correct,wrongs,id);Q.push({id,module,topic,diff,type:'single',stem,options:c.options,answer:c.answer,analysis})}
function addMulti(module,topic,diff,stem,options,answer,analysis){Q.push({id:Q.length+1,module,topic,diff,type:'multi',stem,options,answer:[...answer].sort().join(''),analysis})}
function addJudge(module,topic,diff,stem,isTrue,analysis){const id=Q.length+1;const opts=['正确','错误','只在光学实验中正确','无法判断'];const c=choicePack(isTrue?'正确':'错误',isTrue?['错误','只在热学实验中正确','无法判断']:['正确','只在电学实验中正确','无法判断'],id);Q.push({id,module,topic,diff,type:'single',stem:'判断：'+stem,options:c.options,answer:c.answer,analysis})}
const gens=[
()=>{let n=[5,6,8,10][Q.length%4],s=[0.018,0.024,0.036,0.045,0.060][Q.length%5],ua=s/Math.sqrt(n);addSingle('误差与不确定度','A类标准不确定度',5,`某长度重复测量${n}次，单次测量标准偏差 s=${fmt(s,3)} mm。只考虑重复性时，平均值的A类标准不确定度为多少？`,`${fmt(ua,3)} mm`,[`${fmt(s,3)} mm`,`${fmt(s/n,3)} mm`,`${fmt(s*Math.sqrt(n),3)} mm`],`平均值的A类标准不确定度为 s/√n=${fmt(s,3)}/√${n}=${fmt(ua,3)} mm。满分题常把“单次标准偏差”和“平均值标准不确定度”混在一起。`)},
()=>{let a=[0.02,0.03,0.04,0.05][Q.length%4],b=[0.03,0.04,0.06,0.08][Q.length%4],u=Math.sqrt(a*a+b*b);addSingle('误差与不确定度','合成标准不确定度',5,`某直接测量量的A类标准不确定度为${fmt(a,2)} mm，B类标准不确定度为${fmt(b,2)} mm，且两者相互独立。合成标准不确定度最合理的是`,`${fmt(u,3)} mm`,[`${fmt(a+b,3)} mm`,`${fmt(Math.max(a,b),3)} mm`,`${fmt((a+b)/2,3)} mm`],`独立不确定度按平方和开根号合成：u=√(uA²+uB²)，不是简单相加。`)},
()=>{let p=[1,2,3][Q.length%3];addSingle('误差与不确定度','不确定度传播',5,`某间接量 Q=A^${p}B/C，A、B、C相互独立。相对不确定度传播中，A项前的贡献系数应为`,`${p}`,['1','2','1/2'],`幂函数传播时，相对不确定度项前系数等于幂指数的绝对值。A的幂为${p}，所以贡献系数为${p}。`)},
()=>{let val=[12.34678,8.2351,105.684,0.78246][Q.length%4],u=[0.08,0.03,0.4,0.006][Q.length%4];let correct=[`12.35 ± 0.08`,`8.24 ± 0.03`,`105.7 ± 0.4`,`0.782 ± 0.006`][Q.length%4];addSingle('误差与不确定度','有效数字与最终表达',5,`某实验测量结果计算值为${val}，合成标准不确定度为${u}。最终表达最合理的是`,correct,[`${val} ± ${u}`,`${Math.round(val)} ± ${u}`,`${fmt(val,1)} ± ${fmt(u,3)}`],`最终结果的小数位应与不确定度的小数位对齐，不能保留虚假的精确位数。`)},
()=>{let main=[12,24,36,48][Q.length%4],k=[7,13,17,23][Q.length%4],least=0.02,zero=[0.02,-0.04,0.06,-0.02][Q.length%4];let show=main+k*least,real=show-zero;addSingle('仪器读数与操作','游标卡尺零点修正',5,`0.02 mm游标卡尺主尺读数为${main} mm，第${k}条游标刻线对齐，闭合时零点差为${zero>0?'+':''}${fmt(zero,2)} mm。被测长度应为`,`${fmt(real,2)} mm`,[`${fmt(show,2)} mm`,`${fmt(show+zero,2)} mm`,`${fmt(Math.abs(real),2)} mm`],`先读示值${main}+${k}×0.02=${fmt(show,2)} mm。真实值=示值-零点差=${fmt(real,2)} mm。正零差要减，负零差等于加修正。`)},
()=>{let main=[3.5,4.0,6.5,7.0][Q.length%4],k=[28,36,42,17][Q.length%4],zero=[0.01,-0.02,0.03,-0.01][Q.length%4];let show=main+k*0.01,real=show-zero;addSingle('仪器读数与操作','螺旋测微器读数',5,`螺旋测微器固定刻度读数为${fmt(main,1)} mm，微分筒第${k}格对齐，零点差为${zero>0?'+':''}${fmt(zero,2)} mm。修正后的读数为`,`${fmt(real,2)} mm`,[`${fmt(show,2)} mm`,`${fmt(show+zero,2)} mm`,`${fmt(main+k*0.1,2)} mm`],`螺旋测微器常用分度为0.01 mm，示值=${fmt(show,2)} mm；修正值=示值-零点差。`)},
()=>{let td=[0.2,0.5,1,2][Q.length%4],div=[3,4,5,6][Q.length%4];let T=td*div, f=1000/T;addSingle('仪器读数与操作','示波器频率读数',4,`示波器水平时基为${td} ms/div，一个完整周期占${div}格。信号频率约为`,`${fmt(f,1)} Hz`,[`${fmt(1/T,2)} Hz`,`${fmt(T,2)} Hz`,`${fmt(1000*td/div,1)} Hz`],`周期T=${td}×${div}=${fmt(T,2)} ms=${fmt(T/1000,4)} s，频率f=1/T=${fmt(f,1)} Hz。注意ms到s的换算。`)},
()=>{let vd=[0.5,1,2,5][Q.length%4],div=[2.5,3,4,5][Q.length%4],probe=[1,10][Q.length%2];let v=vd*div*probe;addSingle('仪器读数与操作','示波器电压读数',4,`示波器垂直灵敏度为${vd} V/div，波形峰峰值占${div}格，探头倍率为${probe}×。峰峰值电压为`,`${fmt(v,2)} V`,[`${fmt(v/probe,2)} V`,`${fmt(v/2,2)} V`,`${fmt(v*2,2)} V`],`峰峰值=格数×垂直档位×探头倍率=${div}×${vd}×${probe}=${fmt(v,2)} V。`)},
()=>{let f=[1700,2000,2500,3000][Q.length%4],dx=[9.8,10.0,6.8,5.7][Q.length%4];let v=f*2*dx/100;addSingle('力学与热学实验','声速测量',5,`声速实验中，相邻两个共振位置间距为${dx} cm，信号频率为${f} Hz。由共振法估算声速为`,`${fmt(v,1)} m/s`,[`${fmt(f*dx/100,1)} m/s`,`${fmt(f*dx*2,1)} m/s`,`${fmt(331+0.6*dx,1)} m/s`],`相邻共振位置间距为λ/2，所以λ=2Δx。v=fλ=${f}×2×${dx} cm=${fmt(v,1)} m/s。`)},
()=>{let t=[15,20,25,30][Q.length%4];let v=331.45+0.607*t;addSingle('力学与热学实验','声速温度修正',4,`空气温度为${t} ℃时，按 v≈331.45+0.607t 估算空气中声速，最接近`,`${fmt(v,1)} m/s`,[`${fmt(331.45-0.607*t,1)} m/s`,`${fmt(331.45+t,1)} m/s`,`${fmt(0.607*t,1)} m/s`],`声速受温度影响，代入公式v≈331.45+0.607×${t}=${fmt(v,1)} m/s。`)},
()=>{let l=[0.8,0.9,1.0,1.1][Q.length%4],N=[30,40,50,60][Q.length%4],tt=[54,76,100,126][Q.length%4];let T=tt/N,g=4*Math.PI*Math.PI*l/(T*T);addSingle('力学与热学实验','单摆测重力加速度',5,`单摆摆长l=${l} m，测${N}个周期总时间为${tt} s。由 g=4π²l/T² 得g约为`,`${fmt(g,2)} m/s²`,[`${fmt(4*Math.PI*Math.PI*l/(tt*tt),2)} m/s²`,`${fmt(4*Math.PI*Math.PI*l/(N*N),2)} m/s²`,`${fmt(9.8*T,2)} m/s²`],`单个周期T=总时间/次数=${fmt(T,3)} s，再代入g=4π²l/T²。`)},
()=>{let R=[100,500,1000,2000][Q.length%4],l1=[20,35,40,60][Q.length%4],l2=100-l1;let rx=R*l1/l2;addSingle('电磁学实验','惠斯通电桥',5,`滑线电桥平衡时，标准电阻R=${R} Ω，比例臂长度l1=${l1} cm、l2=${l2} cm。若Rx/R=l1/l2，则Rx为`,`${fmt(rx,1)} Ω`,[`${fmt(R*l2/l1,1)} Ω`,`${fmt(R*(l1+l2)/l2,1)} Ω`,`${fmt(R*l1/100,1)} Ω`],`电桥平衡条件给出Rx=R·l1/l2=${R}×${l1}/${l2}=${fmt(rx,1)} Ω。`)},
()=>{let R=[5,10,20,50][Q.length%4],C=[0.47,1,2.2,4.7][Q.length%4];let tau=R*C;addSingle('电磁学实验','RC暂态时间常量',4,`RC暂态实验中，R=${R} kΩ，C=${C} μF。时间常量τ=RC约为`,`${fmt(tau,2)} ms`,[`${fmt(tau,2)} s`,`${fmt(R/C,2)} ms`,`${fmt(C/R,2)} ms`],`kΩ×μF=ms，所以τ=R C=${R}×${C}=${fmt(tau,2)} ms。`)},
()=>{addSingle('电磁学实验','RLC谐振',4,'RLC串联谐振实验中，若L保持不变而C增大，则谐振频率f0=1/(2π√LC)通常会','减小',['增大','不变','变为零'],`f0与√C成反比，C增大时谐振频率减小。`)},
()=>{let N=[300,500,600,1200][Q.length%4],theta=[9.9,16.0,19.5,40.0][Q.length%4],k=[1,1,1,2][Q.length%4];let d_nm=1e6/N;let lam=d_nm*Math.sin(theta*Math.PI/180)/k;addSingle('光学实验','光栅衍射',5,`光栅常数由${N}线/mm给出，观察到第${k}级谱线衍射角θ=${theta}°。由d sinθ=kλ，波长约为`,`${fmt(lam,1)} nm`,[`${fmt(lam*k,1)} nm`,`${fmt(d_nm/Math.sin(theta*Math.PI/180),1)} nm`,`${fmt(d_nm,1)} nm`],`光栅常数d=1/${N} mm=${fmt(d_nm,1)} nm，λ=d sinθ/k=${fmt(lam,1)} nm。`)},
()=>{let d=[120,150,180,200][Q.length%4],n=[400,500,600,800][Q.length%4];let lam=2*d/n;addSingle('光学实验','迈克尔逊干涉仪',5,`迈克尔逊干涉仪中，反射镜移动${d} μm时数到${n}条条纹变化。由λ=2Δd/N，光源波长为`,`${fmt(lam,3)} μm`,[`${fmt(d/n,3)} μm`,`${fmt(2*d*n,1)} μm`,`${fmt(n/(2*d),3)} μm`],`镜面移动Δd时光程差变化2Δd，所以λ=2Δd/N=${fmt(lam,3)} μm。`)},
()=>{let D1=[3.20,3.60,4.10,4.50][Q.length%4],D2=[4.80,5.10,5.70,6.20][Q.length%4],p=[5,6,8,10][Q.length%4],lam=[589,632.8,546,650][Q.length%4];let Rmm=(D2*D2-D1*D1)/(4*p*lam*1e-6),Rm=Rmm/1000;addSingle('光学实验','牛顿环曲率半径',5,`牛顿环实验中，D_m=${D1} mm，D_{m+${p}}=${D2} mm，λ=${lam} nm。由R=(D²_{m+p}-D²_m)/(4pλ)，R约为`,`${fmt(Rm,3)} m`,[`${fmt(Rmm,3)} m`,`${fmt(Rm/4,3)} m`,`${fmt((D2-D1)/(4*p*lam),3)} m`],`直径用mm时，λ要化为mm：${lam} nm=${fmt(lam*1e-6,6)} mm；算得R=${fmt(Rm,3)} m。单位换算是高分题常见陷阱。`)},
()=>{let u=[20,30,40,50][Q.length%4],v=[20,15,13.33,12.5][Q.length%4];let f=u*v/(u+v);addSingle('光学实验','薄透镜焦距',4,`薄透镜成像实验中，物距u=${u} cm，像距v=${v} cm。由1/f=1/u+1/v，焦距约为`,`${fmt(f,2)} cm`,[`${fmt(u+v,2)} cm`,`${fmt(Math.abs(u-v),2)} cm`,`${fmt(u*v,2)} cm`],`薄透镜公式变形为f=uv/(u+v)，代入得到${fmt(f,2)} cm。`)},
()=>{let th=[30,45,60,75][Q.length%4],ratio=Math.pow(Math.cos(th*Math.PI/180),2);addSingle('光学实验','偏振光马吕斯定律',4,`两偏振片夹角为${th}°，入射到检偏器前的光强为I0。按马吕斯定律，透过光强约为`,`${fmt(ratio,3)} I0`,[`${fmt(Math.cos(th*Math.PI/180),3)} I0`,`${fmt(Math.sin(th*Math.PI/180),3)} I0`,`${fmt(1-ratio,3)} I0`],`马吕斯定律I=I0 cos²θ，注意是cos的平方，不是cos本身。`)},
()=>{let slope=[4.14,4.10,4.20,4.05][Q.length%4];let h=slope*1.602;addSingle('近代物理实验','光电效应h/e斜率',5,`光电效应实验中，遏止电压U0对频率ν作图，斜率约为${slope}×10^-15 V·s。若e=1.602×10^-19 C，则普朗克常量h约为`,`${fmt(h,2)}×10^-34 J·s`,[`${fmt(slope/1.602,2)}×10^-34 J·s`,`${fmt(slope,2)}×10^-15 J·s`,`${fmt(h,2)}×10^-19 J·s`],`由eU0=hν-W可知斜率为h/e，所以h=e×斜率。数量级应为10^-34 J·s。`)},
()=>{addSingle('电磁学实验','霍尔效应方向判断',5,'霍尔效应实验中，在材料、厚度和磁场方向不变时，工作电流I增大到原来的2倍，理想情况下霍尔电压UH将','约增大到原来的2倍',['约减小到原来的1/2','不变','一定反号'],`UH=RH IB/d，在B、d和材料不变时，UH与I成正比。是否反号取决于载流子类型和接线方向。`)},

while(Q.length<1000){for(const g of gens){if(Q.length<1000)g();}}
Q.forEach((q,i)=>{q.id=i+1;q.no=String(i+1).padStart(3,'0')});
let state=loadState();let mode='all';let currentList=[];let idx=0;let selected=new Set();
function loadState(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{records:{},wrong:[],fav:[],exam:null}}catch(e){return{records:{},wrong:[],fav:[],exam:null}}}
function save(){localStorage.setItem(STORE_KEY,JSON.stringify(state));updateStats()}
function unique(a){return [...new Set(a.map(Number))]}
function shuffle(arr,seed=Date.now()){let a=arr.slice(),x=seed%2147483647;for(let i=a.length-1;i>0;i--){x=(x*48271)%2147483647;let j=x%(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function init(){renderTabs();fillFilters();bind();rebuildList();render();updateStats();selfCheck()}
function renderTabs(){const tabs=[['all','全部题库'],['order','顺序刷'],['random','随机刷'],['wrong','错题重练'],['fav','收藏题'],['exam','模拟50题']];document.getElementById('modeTabs').innerHTML=tabs.map(t=>`<button data-mode="${t[0]}" class="${mode===t[0]?'active':''}">${t[1]}</button>`).join('')}
function fillFilters(){let s=document.getElementById('moduleFilter');s.innerHTML='<option value="">全部模块</option>'+modules.map(m=>`<option>${m}</option>`).join('')}
function filteredBase(){let m=document.getElementById('moduleFilter').value,d=document.getElementById('diffFilter').value,kw=document.getElementById('searchInput').value.trim();return Q.filter(q=>(!m||q.module===m)&&(!d||String(q.diff)===d)&&(!kw||(q.stem+q.topic+q.module+q.analysis).includes(kw)))}
function rebuildList(){let base=filteredBase();document.getElementById('examBar').classList.remove('show');if(mode==='wrong')base=base.filter(q=>state.wrong.includes(q.id));if(mode==='fav')base=base.filter(q=>state.fav.includes(q.id));if(mode==='random')base=shuffle(base,Date.now());if(mode==='exam'){base=shuffle(filteredBase(),Date.now()).slice(0,50);state.exam={ids:base.map(q=>q.id),start:Date.now()};document.getElementById('examBar').textContent='模拟考试模式：本次随机抽取50题。做完后看统计；刷新或重新点击会换一套。';document.getElementById('examBar').classList.add('show')}currentList=base;idx=0;selected.clear()}
function render(){const card=document.getElementById('questionCard');if(!currentList.length){card.innerHTML='<div class="empty">当前筛选条件下没有题目。可以切换“全部题库”或清空筛选。</div>';return}let q=currentList[idx];let rec=state.records[q.id];let fav=state.fav.includes(q.id);let optHtml=q.options.map((o,i)=>{let L=letters[i],cls='opt';if(rec){if(q.answer.includes(L))cls+=' correct';if(rec.choice.includes(L)&&!q.answer.includes(L))cls+=' wrong'}else if(selected.has(L))cls+=' selected';return `<button class="${cls}" data-letter="${L}"><b>${L}.</b> ${o}</button>`}).join('');let result='';if(rec){let ok=rec.correct;result=`<div class="answerBox show ${ok?'ok':'bad'}"><b>${ok?'回答正确':'回答错误'}</b><br>你的答案：${rec.choice||'未作答'}｜正确答案：${q.answer}<div class="analysis">解析：${q.analysis}</div></div>`}else{result=`<div class="answerBox" id="answerBox"></div>`}card.innerHTML=`<div class="meta"><span class="tag">${q.module}</span><span class="tag">${q.topic}</span><span class="tag diff">${star(q.diff)}</span><span class="tag">${q.type==='multi'?'多选':'单选/判断'}</span></div><div class="qid">第 ${idx+1} / ${currentList.length} 题｜题号 ${q.no}</div><div class="stem">${q.stem}</div><div class="options">${optHtml}</div>${q.type==='multi'&&!rec?'<button id="submitMulti">提交多选</button>':''}${result}`;document.getElementById('favBtn').textContent=fav?'已收藏':'收藏';card.querySelectorAll('.opt').forEach(b=>b.onclick=()=>selectOption(b.dataset.letter));let sm=document.getElementById('submitMulti');if(sm)sm.onclick=submitMulti;updateStats()}
function selectOption(L){let q=currentList[idx];if(state.records[q.id])return;if(q.type==='multi'){selected.has(L)?selected.delete(L):selected.add(L);render();return}submitAnswer(L)}
function submitMulti(){let ans=[...selected].sort().join('');if(!ans){alert('多选题请至少选择一个选项');return}submitAnswer(ans)}
function submitAnswer(ans){let q=currentList[idx];let correct=ans===q.answer;state.records[q.id]={choice:ans,correct,time:Date.now()};if(correct){state.wrong=state.wrong.filter(id=>id!==q.id)}else{state.wrong=unique([...state.wrong,q.id])}save();render()}
function next(){if(!currentList.length)return;idx=(idx+1)%currentList.length;selected.clear();render();window.scrollTo({top:0,behavior:'smooth'})}
function prev(){if(!currentList.length)return;idx=(idx-1+currentList.length)%currentList.length;selected.clear();render();window.scrollTo({top:0,behavior:'smooth'})}
function updateStats(){let done=Object.keys(state.records).length;let right=Object.values(state.records).filter(r=>r.correct).length;document.getElementById('totalNum').textContent=Q.length;document.getElementById('doneNum').textContent=done;document.getElementById('rightRate').textContent=done?Math.round(right/done*100)+'%':'0%';document.getElementById('wrongNum').textContent=state.wrong.length;document.getElementById('progressBar').style.width=Math.min(100,done/Q.length*100)+'%'}
function bind(){document.getElementById('modeTabs').onclick=e=>{if(e.target.dataset.mode){mode=e.target.dataset.mode;renderTabs();rebuildList();render()}};['moduleFilter','diffFilter','searchInput'].forEach(id=>document.getElementById(id).oninput=()=>{rebuildList();render()});document.getElementById('resetFilterBtn').onclick=()=>{moduleFilter.value='';diffFilter.value='';searchInput.value='';rebuildList();render()};document.getElementById('prevBtn').onclick=prev;document.getElementById('nextBtn').onclick=next;document.getElementById('randomBtn').onclick=()=>{idx=Math.floor(Math.random()*currentList.length);selected.clear();render()};document.getElementById('favBtn').onclick=()=>{let q=currentList[idx];if(!q)return;state.fav=state.fav.includes(q.id)?state.fav.filter(id=>id!==q.id):unique([...state.fav,q.id]);save();render()};document.getElementById('clearBtn').onclick=()=>{if(confirm('确定清空本机浏览器里的做题记录、错题和收藏吗？')){state={records:{},wrong:[],fav:[],exam:null};save();render()}};document.getElementById('exportWrongBtn').onclick=exportWrong;document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(['a','b','c','d'].includes(e.key.toLowerCase()))selectOption(e.key.toUpperCase())})}
function exportWrong(){let list=Q.filter(q=>state.wrong.includes(q.id));if(!list.length){alert('当前没有错题');return}let txt='大学物理实验机考错题导出\n导出时间：'+new Date().toLocaleString()+'\n\n'+list.map(q=>`【${q.no}】${q.module}｜${q.topic}\n${q.stem}\nA. ${q.options[0]}\nB. ${q.options[1]}\nC. ${q.options[2]}\nD. ${q.options[3]}\n正确答案：${q.answer}\n解析：${q.analysis}\n`).join('\n');let blob=new Blob([txt],{type:'text/plain;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='大学物理实验机考错题.txt';a.click();URL.revokeObjectURL(url)}
function selfCheck(){let ids=new Set(Q.map(q=>q.id));let noAnswer=Q.filter(q=>!q.answer||q.options.length!==4).length;document.getElementById('checkInfo').innerHTML=`版本：${VERSION}。系统自检：题量 ${Q.length} 题，题号去重 ${ids.size} 个，选项/答案异常 ${noAnswer} 处。资料定位为“满分冲刺训练题库”，不是学校官方原题；重点训练读数、计算、误差方向、数据处理和实验情境判断。`}
init();
})();
</script>
