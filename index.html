<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="referrer" content="no-referrer" />
<title>全国保研院校热度地图</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:#06101f;color:#e9f7ff}.bg{position:fixed;inset:0;background:radial-gradient(circle at 18% 10%,rgba(34,211,238,.2),transparent 30%),radial-gradient(circle at 90% 2%,rgba(244,63,94,.14),transparent 25%),linear-gradient(135deg,#050b17,#071728 55%,#07101d);z-index:-1}.wrap{height:100vh;max-width:1680px;margin:0 auto;padding:10px;display:grid;grid-template-rows:auto 1fr;gap:10px}.header{height:92px;border:1px solid rgba(103,232,249,.2);background:linear-gradient(135deg,rgba(15,23,42,.94),rgba(8,47,73,.66));border-radius:22px;padding:14px 18px;box-shadow:0 16px 50px rgba(8,145,178,.12);display:flex;justify-content:space-between;gap:16px;align-items:center}.kicker{color:#67e8f9;font-size:11px;letter-spacing:.08em}.title{font-size:30px;font-weight:900;letter-spacing:.01em;margin-top:5px}.desc{margin-top:6px;color:#a7c7d9;font-size:13px}.metrics{display:grid;grid-template-columns:repeat(3,104px);gap:10px}.metric{height:66px;border-radius:16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);text-align:center;display:flex;flex-direction:column;justify-content:center}.metric .label{font-size:11px;color:#8fb7c7}.metric .num{font-size:24px;font-weight:900}.ticker{height:36px;border:1px solid rgba(103,232,249,.16);background:rgba(15,23,42,.76);border-radius:14px;padding:0 12px;display:flex;gap:12px;align-items:center;overflow:hidden}.ticker b{white-space:nowrap;color:#fde68a}.ticker-window{overflow:hidden;flex:1}.ticker-track{display:inline-flex;gap:34px;white-space:nowrap;animation:tickerMove 260s linear infinite}.ticker-item{color:#dff7ff;font-size:13px}.ticker-item a{color:#67e8f9;text-decoration:none}.ticker-item .time{color:#8fb7c7;margin-left:8px}.ticker:hover .ticker-track{animation-play-state:paused}@keyframes tickerMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.layout{min-height:0;display:grid;grid-template-columns:270px minmax(520px,1fr) 370px;gap:10px}.panel{min-height:0;border:1px solid rgba(103,232,249,.16);background:rgba(15,23,42,.78);border-radius:20px;padding:12px;box-shadow:0 16px 46px rgba(2,6,23,.26);backdrop-filter:blur(12px)}.panel h3{margin:0 0 10px;font-size:16px;display:flex;gap:8px;align-items:center}.left,.right{min-height:0;display:grid;gap:10px}.left{grid-template-rows:auto 1fr}.right{grid-template-rows:1.05fr .95fr}.control{display:flex;flex-direction:column;gap:8px}.control input,.control select{height:38px;border-radius:13px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#e9f7ff;padding:0 12px;outline:none}.control input::placeholder{color:#6b8ca0}.control select option{color:#111}.btn{height:38px;border:0;border-radius:13px;background:linear-gradient(135deg,#22d3ee,#a7f3d0);font-weight:900;color:#06101f;cursor:pointer}.small{font-size:12px;color:#8fb7c7;line-height:1.6}.map-panel{position:relative;overflow:hidden}.map{height:100%;width:100%;}.bar{height:7px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.bar>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#22d3ee,#fde68a,#fb7185)}.row-title{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}.status-row{margin:10px 0}.city-top{height:100%;overflow:hidden}.rank-list{height:100%;overflow:hidden;position:relative}.school-card{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);border-radius:16px;padding:11px;margin-bottom:9px}.school-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.school-name{font-weight:900}.school-meta{margin-top:4px;font-size:12px;color:#8fb7c7}.heat{font-size:22px;font-weight:900;color:#fecdd3;text-align:right}.trend{font-size:11px;color:#a7f3d0;text-align:right}.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}.tag{font-size:11px;padding:3px 7px;border-radius:999px;background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.18);color:#cffafe}.pill{display:inline-flex;padding:3px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.14);font-size:12px;color:#dff7ff}.data-line{margin-top:8px;padding:8px 9px;border-radius:12px;background:rgba(34,211,238,.06);border:1px solid rgba(34,211,238,.12);font-size:12px;color:#cfefff;line-height:1.6}.data-line a{color:#67e8f9;text-decoration:none}.muted{color:#8fb7c7}.receive-feed{height:100%;overflow:hidden;position:relative}.receive-track{animation:receiveMove 240s linear infinite}.receive-feed:hover .receive-track{animation-play-state:paused}@keyframes receiveMove{from{transform:translateY(0)}to{transform:translateY(-50%)}}.receive-card{border:1px solid rgba(34,211,238,.16);background:rgba(34,211,238,.055);border-radius:16px;padding:10px;margin-bottom:8px}.receive-title{display:flex;justify-content:space-between;gap:8px;font-weight:900}.receive-total{color:#fde68a;font-size:18px;font-weight:900}.receive-major{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 0;border-top:1px solid rgba(255,255,255,.06);font-size:12px}.receive-major:first-child{border-top:0}.receive-major span:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.receive-major b{color:#cffafe}.receive-source{margin-top:7px;font-size:12px}.receive-source a{color:#67e8f9;text-decoration:none}.summer-feed{height:100%;overflow:hidden;position:relative}.summer-track{animation:summerMove 300s linear infinite}.summer-feed:hover .summer-track{animation-play-state:paused}@keyframes summerMove{from{transform:translateY(0)}to{transform:translateY(-50%)}}.summer-card{border:1px solid rgba(251,191,36,.18);background:rgba(251,191,36,.06);border-radius:16px;padding:10px;margin-bottom:8px}.summer-school{font-weight:900;color:#fde68a}.summer-title{margin-top:4px;font-size:13px;line-height:1.45;color:#e9f7ff}.summer-date{margin-top:6px;font-size:12px;color:#8fb7c7}.summer-card a{color:#67e8f9;text-decoration:none}.rank-track{animation:rankMove 260s linear infinite}.rank-list:hover .rank-track{animation-play-state:paused}@keyframes rankMove{from{transform:translateY(0)}to{transform:translateY(-50%)}}.map-tip{position:absolute;left:14px;top:14px;z-index:5;border:1px solid rgba(34,211,238,.18);background:rgba(2,6,23,.55);border-radius:14px;padding:8px 10px;font-size:12px;color:#cfefff}.footer-note{position:absolute;left:14px;right:14px;bottom:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;z-index:5}.mini-city{padding:9px;border-radius:13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:12px}.mini-city b{display:block;font-size:15px;margin-bottom:4px}.empty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:#8fb7c7;font-size:13px;line-height:1.8}.src-note{font-size:11px;color:#8fb7c7;margin-top:6px}@media(max-width:1200px){html,body{overflow:auto}.wrap{height:auto}.layout{grid-template-columns:1fr}.left,.right{grid-template-rows:auto}.map-panel{height:650px}.metrics{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
<header class="header">
  <div><div class="kicker">BAOYAN DATA SCREEN · GITHUB PAGES · REAL CHINA MAP</div><div class="title">全国保研院校热度地图</div><div class="desc">推免资格院校分布 / 城市保研资源 / 全国夏令营公告动态 / 院校热度榜</div></div>
  <div class="metrics"><div class="metric"><div class="label">院校数</div><div class="num" id="mSchools">-</div></div><div class="metric"><div class="label">城市点位</div><div class="num" id="mCities">-</div></div><div class="metric"><div class="label">当前城市</div><div class="num" id="mActive">-</div></div></div>
</header>
<main class="layout">
  <section class="left">
    <div class="panel"><h3>🔍 筛选条件</h3><div class="control"><input id="search" placeholder="搜学校 / 城市 / 专业，例如：南京、计算机"/><select id="province"><option value="全部">全部省份</option></select><select id="level"><option value="全部">全部层次</option><option value="985">985</option><option value="211">211</option><option value="双一流">双一流</option><option value="普通">普通/新增</option></select><button class="btn" id="applyBtn">刷新地图</button></div><p class="small">已接入云端自动更新；只展示官网可核验数据。</p></div>
    <div class="panel"><h3>🏙️ 城市热度 TOP</h3><div id="cityTop" class="city-top"></div></div>
  </section>
  <section class="panel map-panel"><div id="map" class="map"></div><div class="footer-note" id="legendCards"></div></section>
  <section class="right">
    <div class="panel"><h3>📢 全国夏令营公告动态</h3><div class="summer-feed" id="summerFeed"></div></div>
    <div class="panel"><h3>🔥 院校热度动态榜</h3><div class="rank-list"><div id="rankList"></div></div></div>
  </section>
</main>
</div>
<script>
let allSchools=[], filteredSchools=[], filteredCities=[], activeCity='北京', chart=null;
const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const CITY_COORDS=[{"city":"北京","lng":116.4074,"lat":39.9042},{"city":"上海","lng":121.4737,"lat":31.2304},{"city":"天津","lng":117.2,"lat":39.1333},{"city":"重庆","lng":106.5516,"lat":29.563},{"city":"南京","lng":118.7969,"lat":32.0603},{"city":"苏州","lng":120.5853,"lat":31.2989},{"city":"无锡","lng":120.3119,"lat":31.4912},{"city":"常州","lng":119.9741,"lat":31.8112},{"city":"镇江","lng":119.4528,"lat":32.2044},{"city":"扬州","lng":119.421,"lat":32.3932},{"city":"徐州","lng":117.1848,"lat":34.2618},{"city":"南通","lng":120.8943,"lat":31.9802},{"city":"杭州","lng":120.1551,"lat":30.2741},{"city":"宁波","lng":121.5503,"lat":29.8746},{"city":"合肥","lng":117.2272,"lat":31.8206},{"city":"武汉","lng":114.3054,"lat":30.5931},{"city":"长沙","lng":112.9388,"lat":28.2282},{"city":"广州","lng":113.2644,"lat":23.1291},{"city":"深圳","lng":114.0579,"lat":22.5431},{"city":"成都","lng":104.0665,"lat":30.5728},{"city":"西安","lng":108.9398,"lat":34.3416},{"city":"哈尔滨","lng":126.6425,"lat":45.7567},{"city":"长春","lng":125.3235,"lat":43.8171},{"city":"沈阳","lng":123.4315,"lat":41.8057},{"city":"大连","lng":121.6147,"lat":38.914},{"city":"济南","lng":117.1201,"lat":36.6512},{"city":"青岛","lng":120.3826,"lat":36.0671},{"city":"郑州","lng":113.6254,"lat":34.7466},{"city":"厦门","lng":118.0894,"lat":24.4798},{"city":"福州","lng":119.2965,"lat":26.0745},{"city":"南昌","lng":115.8582,"lat":28.6829},{"city":"昆明","lng":102.8329,"lat":24.8801},{"city":"贵阳","lng":106.6302,"lat":26.6477},{"city":"兰州","lng":103.8343,"lat":36.0611},{"city":"银川","lng":106.2309,"lat":38.4872},{"city":"乌鲁木齐","lng":87.6168,"lat":43.8256},{"city":"石河子","lng":86.0411,"lat":44.3059},{"city":"呼和浩特","lng":111.7492,"lat":40.8426},{"city":"南宁","lng":108.3669,"lat":22.817},{"city":"海口","lng":110.1983,"lat":20.0442},{"city":"西宁","lng":101.7782,"lat":36.6171},{"city":"拉萨","lng":91.1409,"lat":29.6456},{"city":"太原","lng":112.5489,"lat":37.8706},{"city":"保定","lng":115.4646,"lat":38.8739},{"city":"石家庄","lng":114.5149,"lat":38.0428},{"city":"桂林","lng":110.2900,"lat":25.2736}];
const coord=Object.fromEntries(CITY_COORDS.map(c=>[c.city,c]));
function levelOf(s){if(s.is_985==='是')return '985'; if(s.is_211==='是')return '211'; if(s.is_double_first_class==='是')return '双一流'; return '普通';}
function heatColor(v){v=+v||0;if(v>=95)return '#fb7185';if(v>=88)return '#fbbf24';if(v>=78)return '#22d3ee';return '#94a3b8'}
function majorsOf(s){return String(s.hot_majors||s.majors||'').split(/[\/、,，]/).map(x=>x.trim()).filter(Boolean)}
function normalize(s){s.heat_score=+s.heat_score||+s.school_level_score||70;s.majors_list=majorsOf(s);return s}
function groupCities(arr){const m={};arr.forEach(s=>{let c=coord[s.city];if(!c)return;if(!m[s.city])m[s.city]={city:s.city,lng:c.lng,lat:c.lat,count:0,total:0,max_heat:0,top_school:''};let it=m[s.city];it.count++;it.total+=s.heat_score;if(s.heat_score>it.max_heat){it.max_heat=s.heat_score;it.top_school=s.school_name}});return Object.values(m).map(c=>({...c,avg_heat:Math.round(c.total/c.count)})).sort((a,b)=>b.max_heat-a.max_heat||b.count-a.count)}
function hasReceive(s){return String(s.receive_recommend_total||'').trim() || (Array.isArray(s.receive_recommend_by_major)&&s.receive_recommend_by_major.length)}
function receiveTotal(s){let m=Array.isArray(s.receive_recommend_by_major)?s.receive_recommend_by_major:[];return +(String(s.receive_recommend_total||'').replace(/\D/g,'')) || m.reduce((a,x)=>a+(+x.count||0),0)}
function applyFilter(){let q=$('search').value.trim(),p=$('province').value,l=$('level').value;filteredSchools=allSchools.filter(s=>(p==='全部'||s.province===p)&&(l==='全部'||levelOf(s)===l)&&(!q||`${s.school_name}${s.city}${s.province}${s.hot_majors}`.includes(q))).sort((a,b)=>b.heat_score-a.heat_score);filteredCities=groupCities(filteredSchools);activeCity=filteredCities[0]?.city||'北京';renderAll()}
function renderControls(){let ps=[...new Set(allSchools.map(s=>s.province).filter(Boolean))].sort();$('province').innerHTML='<option value="全部">全部省份</option>'+ps.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('')}
async function renderMap(){if(!window.echarts){$('map').innerHTML='<div class="empty">ECharts 没加载出来，请确认网络。</div>';return}if(!chart){chart=echarts.init($('map'));window.addEventListener('resize',()=>chart.resize())}let geo;try{let res=await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json',{referrerPolicy:'no-referrer'});geo=await res.json()}catch(e){$('map').innerHTML='<div class="empty">中国地图 GeoJSON 加载失败。<br>请刷新或换网络。</div>';return}echarts.registerMap('china',geo);let pts=filteredCities.map(c=>({name:c.city,value:[c.lng,c.lat,c.max_heat,c.count,c.avg_heat],city:c,itemStyle:{color:heatColor(c.max_heat)}}));chart.setOption({backgroundColor:'transparent',tooltip:{trigger:'item',backgroundColor:'rgba(2,6,23,.92)',borderColor:'rgba(103,232,249,.28)',textStyle:{color:'#e9f7ff'},formatter:p=>p.seriesType==='effectScatter'?`<b>${p.data.city.city}</b><br/>院校数：${p.data.city.count}<br/>最高热度：${p.data.city.max_heat}<br/>代表院校：${p.data.city.top_school}`:p.name},geo:{map:'china',roam:true,zoom:1.15,center:[104,36],label:{show:false},itemStyle:{areaColor:'rgba(8,47,73,.76)',borderColor:'rgba(103,232,249,.55)',borderWidth:1},emphasis:{itemStyle:{areaColor:'rgba(14,116,144,.86)'}}},series:[{type:'map',map:'china',geoIndex:0,data:[]},{name:'城市热度',type:'effectScatter',coordinateSystem:'geo',data:pts,rippleEffect:{scale:3.2,brushType:'stroke'},symbolSize:d=>Math.max(9,Math.min(31,8+d[2]/6+d[3]*1.1)),label:{show:true,formatter:'{b}',position:'right',color:'#dff7ff',fontSize:11},emphasis:{scale:true}}]},true);chart.off('click');chart.on('click',p=>{if(p.seriesType==='effectScatter'){activeCity=p.name;$('mActive').textContent=activeCity;}})}
function renderCityTop(){$('cityTop').innerHTML=filteredCities.slice(0,8).map((c,i)=>`<div class="status-row" style="cursor:pointer" onclick="activeCity='${c.city}';$('mActive').textContent=activeCity"><div class="row-title"><span>${i+1}. ${esc(c.city)} <small style="color:#8fb7c7">${c.count}校</small></span><span>${c.max_heat}</span></div><div class="bar"><span style="width:${c.max_heat}%;background:${heatColor(c.max_heat)}"></span></div></div>`).join('')}
function renderLegend(){$('legendCards').innerHTML=filteredCities.slice(0,4).map(c=>`<div class="mini-city"><b>${esc(c.city)}</b>${c.count}所院校 · 最高${c.max_heat}</div>`).join('')}
function card(s,i){let majors=(s.majors_list||[]).slice(0,4).map(m=>`<span class="tag">${esc(m)}</span>`).join('');return `<div class="school-card"><div class="school-top"><div><div class="school-name">${i}. ${esc(s.school_name)}</div><div class="school-meta">${esc(s.province)} · ${esc(s.city)} · ${levelOf(s)} · ${esc(s.heat_level||'')}</div></div><div><div class="heat">${s.heat_score}</div><div class="trend">热度指数</div></div></div><div class="bar" style="margin-top:9px"><span style="width:${s.heat_score}%;background:${heatColor(s.heat_score)}"></span></div><div class="tags">${majors}</div></div>`}
function renderRank(){let arr=filteredSchools.slice(0,30);let html=arr.map((s,i)=>card(s,i+1)).join('');$('rankList').innerHTML=`<div class="rank-track">${html}${html}</div>`}
function isLatestReceive(s){let y=String(s.receive_recommend_year||'');return !y || y.includes('2026')}
function renderSummerFeed(){
  const isFresh=(n)=>{let d=String(n.date||''); let text=`${n.school||''}${n.title||''}${n.url||''}`; return d>='2026-01-01'||d==='2026'||d.startsWith('2026')||text.includes('2026')};
  fetch('data/summer_camp_notices.json?ts='+Date.now()).then(r=>r.json()).then(j=>{
    let notices=(j.notices||[]).filter(n=>n && n.school!=='系统提示' && (n.title||n.url) && isFresh(n));
    const seen=new Set();
    notices=notices.filter(n=>{let k=`${n.school}|${n.title}|${n.url}`; if(seen.has(k))return false; seen.add(k); return true;});
    notices.sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
    if(!notices.length){$('summerFeed').innerHTML='<div class="empty">暂无已抓取的2026年夏令营公告。<br>系统会持续抓取全国高校官网和公开招生信息源，抓到后自动展示。</div>';return;}
    let cards=notices.slice(0,80).map((n,i)=>`<div class="summer-card"><div class="summer-school">${i+1}. ${esc(n.school||'院校')}</div><div class="summer-title">${n.url?`<a href="${esc(n.url)}" target="_blank">${esc(n.title||'夏令营公告')}</a>`:esc(n.title||'夏令营公告')}</div><div class="summer-date">${esc(n.date||'2026')} · ${esc(n.source_grade||n.source_name||'公开来源')}</div></div>`);
    let repeated=[];while(repeated.length<120){repeated=repeated.concat(cards)}
    $('summerFeed').innerHTML=`<div class="summer-track">${repeated.join('')}</div>`;
  }).catch(()=>{$('summerFeed').innerHTML='<div class="empty">公告数据加载失败，请稍后刷新。</div>'});
}
function renderAll(){$('mSchools').textContent=filteredSchools.length;$('mCities').textContent=filteredCities.length;$('mActive').textContent=activeCity;renderCityTop();renderLegend();renderRank();renderSummerFeed();renderMap()}
$('applyBtn').onclick=applyFilter;$('search').addEventListener('keydown',e=>{if(e.key==='Enter')applyFilter()});$('province').onchange=applyFilter;$('level').onchange=applyFilter;
async function start(){try{let r=await fetch('data/schools.json?ts='+Date.now());let j=await r.json();allSchools=(j.schools||j).map(normalize)}catch(e){allSchools=[];console.error(e)}renderControls();applyFilter()}
start();
</script>
</body>
</html>
