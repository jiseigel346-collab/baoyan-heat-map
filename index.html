function groupCities(arr){let m={};arr.forEach(s=>{let city=s.city||'';let co=coordMap[city];if(!city||!co)return;let it=m[city]||(m[city]={city, lng:co.lng, lat:co.lat, count:0, total:0, max_heat:0, top_school:''});it.count++;it.total+=s.heat_score; if(s.heat_score>it.max_heat){it.max_heat=s.heat_score;it.top_school=s.school_name;}});return Object.values(m).map(c=>({...c, avg_heat:Math.round(c.total/c.count)})).sort((a,b)=>b.max_heat-a.max_heat||b.count-a.count);}
async function renderMap(){if(!window.echarts){$('map').innerHTML='<div style="padding:80px;color:#fecaca">ECharts 没加载出来。请确认电脑能联网访问 cdn.jsdelivr.net。</div>';return;}if(!chart){chart=echarts.init($('map'));window.addEventListener('resize',()=>chart.resize());}
let geo;try{let res=await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json',{referrerPolicy:'no-referrer'});geo=await res.json();}catch(e){$('map').innerHTML='<div style="padding:80px;color:#fecaca">真实中国地图 GeoJSON 加载失败。<br>请确认联网，或换成云端版。<br>错误：'+esc(e.message)+'</div>';return;}
echarts.registerMap('china',geo);let pts=filteredCities.map(c=>({name:c.city,value:[c.lng,c.lat,c.max_heat,c.count,c.avg_heat],city:c,itemStyle:{color:heatColor(c.max_heat)}}));chart.setOption({backgroundColor:'transparent',tooltip:{trigger:'item',backgroundColor:'rgba(2,6,23,.92)',borderColor:'rgba(103,232,249,.28)',textStyle:{color:'#e9f7ff'},formatter:p=>p.seriesType==='effectScatter'?`<b>${p.data.city.city}</b><br/>院校数：${p.data.city.count}<br/>最高热度：${p.data.city.max_heat}<br/>代表院校：${p.data.city.top_school}`:p.name},geo:{map:'china',roam:true,zoom:1.12,center:[104,36],label:{show:false},itemStyle:{areaColor:'rgba(8,47,73,.76)',borderColor:'rgba(103,232,249,.55)',borderWidth:1},emphasis:{itemStyle:{areaColor:'rgba(14,116,144,.86)'}}},series:[{type:'map',map:'china',geoIndex:0,data:[]},{name:'城市热度',type:'effectScatter',coordinateSystem:'geo',data:pts,rippleEffect:{scale:3.2,brushType:'stroke'},symbolSize:d=>Math.max(9,Math.min(34,8+d[2]/6+d[3]*1.2)),label:{show:true,formatter:'{b}',position:'right',color:'#dff7ff',fontSize:11},emphasis:{scale:true}}]},true);chart.off('click');chart.on('click',p=>{if(p.seriesType==='effectScatter'){activeCity=p.name;$('mActive').textContent=activeCity;renderCityDetail();}});}
function renderCityTop(){$('cityTop').innerHTML=filteredCities.slice(0,8).map((c,i)=>`<div class="status-row" style="cursor:pointer" onclick="activeCity='${c.city}';$('mActive').textContent=activeCity;renderCityDetail();"><div class="row-title"><span>${i+1}. ${esc(c.city)} <small style="color:#8fb7c7">${c.count}校</small></span><span>${c.max_heat}</span></div><div class="bar"><span style="width:${c.max_heat}%;background:${heatColor(c.max_heat)}"></span></div></div>`).join('');}
function renderLegend(){$('legendCards').innerHTML=filteredCities.slice(0,4).map(c=>`<div class="legend-card"><b>${esc(c.city)}</b>${c.count}所院校 · 最高热度${c.max_heat}<div class="bar" style="margin-top:8px"><span style="width:${c.max_heat}%;background:${heatColor(c.max_heat)}"></span></div></div>`).join('');}
function renderRank(){clearInterval(rankTimer);rankStart=0;function draw(){let arr=filteredSchools;let take=arr.slice(rankStart,rankStart+10).concat(arr.slice(0,Math.max(0,rankStart+10-arr.length)));$('rankList').innerHTML=take.map((s,i)=>card(s,i+1)).join('')||'<div class="small">暂无数据</div>';if(arr.length)rankStart=(rankStart+1)%arr.length;}draw();rankTimer=setInterval(draw,2300);}
function receiveBlock(s,limit=5){
  let recvTotal=String(s.receive_recommend_total||'').trim();
  let recvYear=String(s.receive_recommend_year||'').trim();
  let recvSrc=String(s.receive_recommend_source_url||'').trim();
  let recvName=String(s.receive_recommend_source_name||'').trim();
  let complete=String(s.receive_recommend_is_complete||'').trim()==='是';
  let byMajor=Array.isArray(s.receive_recommend_by_major)?s.receive_recommend_by_major:[];
  if(!recvTotal && !byMajor.length)return '';
  let total=recvTotal||String(byMajor.reduce((a,m)=>a+(parseInt(m.count)||0),0));
  let title=complete?'接收推免总人数':'接收推免人数';
  let majors=byMajor.slice(0,limit).map(m=>`<div class="receive-major"><span>${esc(m.major_name||m.major||'专业')}</span><b>${esc(m.count||'')}人</b></div>`).join('');
  let source=recvSrc?`<div class="receive-source"><a href="${esc(recvSrc)}" target="_blank">查看来源</a>${recvName?` · ${esc(recvName)}`:''}</div>`:(recvName?`<div class="receive-source">来源：${esc(recvName)}</div>`:'');
  return `<div class="data-line"><b>${title}：${esc(total)}人</b>${recvYear?`　年份：${esc(recvYear)}`:''}<div class="major-box">${majors||'<span class="muted">暂未解析到专业分布</span>'}</div>${source}</div>`;
}
function card(s,i){let majors=(s.majors_list||[]).slice(0,4).map(m=>`<span class="tag">${esc(m)}</span>`).join('');let recv=receiveBlock(s,3);return `<div class="school-card"><div class="school-top"><div><div class="school-name">${i}. ${esc(s.school_name)}</div><div class="school-meta">${esc(s.province)} · ${esc(s.city)} · ${levelOf(s)} · ${esc(s.heat_level)}</div></div><div><div class="heat">${s.heat_score}</div><div class="trend">热度指数</div></div></div><div class="bar" style="margin-top:10px"><span style="width:${s.heat_score}%;background:${heatColor(s.heat_score)}"></span></div><div class="tags">${majors}</div>${recv}</div>`;}

function hasReceive(s){return String(s.receive_recommend_total||'').trim() || (Array.isArray(s.receive_recommend_by_major)&&s.receive_recommend_by_major.length);}
function renderReceiveFeed(){
  let arr=allSchools.filter(hasReceive).sort((a,b)=>(parseInt(b.receive_recommend_total)||0)-(parseInt(a.receive_recommend_total)||0));
  if(!arr.length){$('receiveFeed').innerHTML='<div class="small">暂无已核验接收推免专业数据。</div>';return;}
  let cards=arr.slice(0,16).map((s,i)=>{
    let byMajor=Array.isArray(s.receive_recommend_by_major)?s.receive_recommend_by_major:[];
    let total=String(s.receive_recommend_total||'').trim()||String(byMajor.reduce((a,m)=>a+(parseInt(m.count)||0),0));
    let src=String(s.receive_recommend_source_url||'').trim();
    let majors=byMajor.slice(0,6).map(m=>`<div class="receive-major"><span>${esc(m.major_name||m.major||'专业')}</span><b>${esc(m.count||'')}人</b></div>`).join('');
    return `<div class="receive-card"><div class="receive-title"><span>${i+1}. ${esc(s.school_name)}</span><span class="receive-total">${esc(total)}人</span></div>${majors?`<div style="margin-top:8px">${majors}</div>`:''}${src?`<div class="receive-source"><a href="${esc(src)}" target="_blank">查看官网来源</a></div>`:''}</div>`;
  });
  let html=cards.join('');
  $('receiveFeed').innerHTML=`<div class="receive-track">${html}${html}</div>`;
}
async function renderSummerTicker(){
  let notices=[];
  try{let r=await fetch('data/summer_camp_notices.json?ts='+Date.now());let j=await r.json();notices=(j.notices||[]).filter(n=>n && n.school!=='系统提示' && (n.title||n.url));}catch(e){notices=[];}
  if(!notices.length){$('summerTickerBox').style.display='none';return;}
  $('summerTickerBox').style.display='flex';
  let items=notices.slice(0,24).map(n=>`<span class="ticker-item">${esc(n.school||'')}：${n.url?`<a href="${esc(n.url)}" target="_blank">${esc(n.title||'')}</a>`:esc(n.title||'')}${n.date?`<span class="time">${esc(n.date)}</span>`:''}</span>`).join('');
  $('summerTicker').innerHTML=items+items;
}

function renderCityDetail(){
  $('cityTitle').textContent=`📍 ${activeCity||'城市'} · 院校与相关专业`;
  let arr=filteredSchools.filter(s=>s.city===activeCity).sort((a,b)=>b.heat_score-a.heat_score);
  $('cityDetail').innerHTML=arr.map((s,i)=>{
    let majors=(s.majors_list||[]).slice(0,6).map(m=>`<span class="tag">${esc(m)}</span>`).join('');
    let quota=String(s.recommendation_quota||'').trim();
    let rate=String(s.recommendation_rate||'').trim();
    let year=String(s.recommendation_year||'').trim();
    let src=String(s.recommendation_source_url||s.quota_source_url||'').trim();
    let sourceName=String(s.recommendation_source_name||s.source_name||'').trim();
    let info='';
    if(quota||rate){
      let parts=[];
      if(quota)parts.push(`本校推荐名额：${esc(quota)}人`);
      if(rate)parts.push(`推免率：${esc(rate)}`);
      if(year)parts.push(`年份：${esc(year)}`);
      let source=src?`　<a href="${esc(src)}" target="_blank">来源</a>`:(sourceName?`　来源：${esc(sourceName)}`:'');
      info+=`<div class="data-line">${parts.join('　')}${source}</div>`;
    }

    let recvTotal=String(s.receive_recommend_total||'').trim();
    let recvYear=String(s.receive_recommend_year||'').trim();
    let recvSrc=String(s.receive_recommend_source_url||'').trim();
    let recvName=String(s.receive_recommend_source_name||'').trim();
    let recvComplete=String(s.receive_recommend_is_complete||'').trim()==='是';
    let byMajor=Array.isArray(s.receive_recommend_by_major)?s.receive_recommend_by_major:[];
    if(recvTotal || byMajor.length){
      let title=recvComplete?'接收推免总人数':'接收推免人数';
      let source=recvSrc?`　<a href="${esc(recvSrc)}" target="_blank">来源</a>`:(recvName?`　来源：${esc(recvName)}`:'');
      let majorHtml='';
      if(byMajor.length){
        majorHtml='<div class="major-box"><div class="muted">专业分布 TOP</div>'+byMajor.slice(0,8).map(m=>`<div class="major-row"><span>${esc(m.major_name||m.major||'')}</span><b>${esc(m.count||'')}人</b></div>`).join('')+'</div>';
      }
      info+=`<div class="data-line"><b>${title}：${esc(recvTotal||byMajor.reduce((a,m)=>a+(parseInt(m.count)||0),0))}人</b>${recvYear?`　年份：${esc(recvYear)}`:''}${source}${majorHtml}</div>`;
    }
    return `<div class="school-card"><div class="school-top"><div><div class="school-name">${i+1}. ${esc(s.school_name)}</div><div class="school-meta">${esc(s.province)} · ${levelOf(s)} · ${esc(s.school_type)}</div></div><span class="pill">${s.heat_score}</span></div><div class="tags">${majors}</div>${info}</div>`;
  }).join('')||'<div class="small">当前筛选条件下，该城市暂无院校。</div>';
}
$('applyBtn').onclick=applyFilter;$('search').addEventListener('keydown',e=>{if(e.key==='Enter')applyFilter();});$('province').onchange=applyFilter;$('level').onchange=applyFilter;

start();
